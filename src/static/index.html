<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rust Proxy Manager</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <!-- Setup view: shown only when not initialized -->
  <div id="setup-view" class="hidden">
    <div class="setup-card">
      <div class="setup-lang-bar"><span id="setup-lang-btn" class="lang-switch">EN</span></div>
      <h1 id="setup-title">Rust Proxy Manager</h1>
      <p id="setup-desc" class="setup-desc">此实例尚未初始化，请设置管理员账号以开始使用。</p>
      <form id="init-form" class="setup-form">
        <label id="setup-admin-user-label">
          管理员用户
          <input name="admin_user" autocomplete="username" required>
        </label>
        <label id="setup-admin-pass-label">
          管理员密码
          <input name="admin_pass" type="password" autocomplete="new-password" required>
        </label>
        <button id="setup-init-btn" type="submit">初始化</button>
      </form>
    </div>
  </div>

  <!-- Login view: shown when initialized but signed out -->
  <div id="login-view" class="hidden auth-view">
    <div class="setup-card">
      <div class="setup-lang-bar"><span id="login-lang-btn" class="lang-switch">EN</span></div>
      <h1 id="login-title">Rust Proxy Manager</h1>
      <p id="login-desc" class="setup-desc">请输入管理员账号和密码。</p>
      <form id="login-form" class="setup-form">
        <label id="login-admin-user-label">
          管理员用户
          <input name="admin_user" autocomplete="username" required>
        </label>
        <label id="login-admin-pass-label">
          管理员密码
          <input name="admin_pass" type="password" autocomplete="current-password" required>
        </label>
        <button id="login-btn" type="submit">登录</button>
      </form>
    </div>
  </div>

  <!-- App view: shown only when authenticated -->
  <div id="app-view" class="hidden">
    <header class="topbar">
      <div>
        <h1>Rust Proxy Manager</h1>
        <p id="status-line">加载中</p>
        <p id="socks-line">SOCKS5 Port: -</p>
      </div>
      <div class="topbar-right">
        <span id="app-lang-btn" class="lang-switch">EN</span>
        <div class="actions">
          <button id="refresh-btn" type="button">刷新</button>
          <button id="start-btn" type="button">启动</button>
          <button id="stop-btn" type="button" class="secondary">停止</button>
          <button id="logout-btn" type="button" class="secondary">退出</button>
        </div>
      </div>
    </header>

    <main>
      <section class="band">
        <div class="section-head">
          <h2>订阅</h2>
          <span id="subscription-count" class="badge">0</span>
        </div>
        <form id="subscription-form" class="grid-form wide-first">
          <label id="sub-url-label">
            URL
            <input id="sub-url-input" name="url" type="url" placeholder="https://example.com/sub" required>
          </label>
          <label id="sub-name-label">
            名称
            <input id="sub-name-input" name="name" placeholder="可选">
          </label>
          <button id="sub-add-btn" type="submit">添加并同步</button>
        </form>
        <div id="subscriptions" class="table-wrap"></div>
      </section>

      <section class="band">
        <div class="section-head">
          <h2>节点</h2>
          <span id="node-count" class="badge">0</span>
        </div>
        <div id="nodes" class="table-wrap"></div>
      </section>

      <section class="band">
        <div class="section-head">
          <h2>Socks 账号</h2>
          <span id="account-count" class="badge">0</span>
        </div>
        <form id="account-form" class="grid-form account-form">
          <input type="hidden" name="id">
          <label id="acc-name-label">
            名称
            <input name="name" required>
          </label>
          <label id="acc-username-label">
            用户名
            <input name="username" required>
          </label>
          <label id="acc-password-label">
            密码
            <input name="password" type="password" required>
          </label>
          <label id="acc-node-label">
            节点
            <select name="node_id" required></select>
          </label>
          <button id="acc-save-btn" type="submit">保存</button>
          <button id="account-cancel" type="button" class="secondary hidden">取消</button>
        </form>
        <div id="accounts" class="table-wrap"></div>
      </section>

      <section class="band config-band">
        <div class="section-head">
          <h2>Mihomo 配置</h2>
          <button id="preview-btn" type="button" class="secondary">预览</button>
        </div>
        <pre id="config-output"></pre>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>
  <div id="loading-overlay" class="hidden"><div class="spinner"></div></div>

  <script>
    const state = {
      initialized: false,
      authenticated: false,
      subscriptions: [],
      nodes: [],
      accounts: [],
      mihomo: null,
      lang: 'zh-CN',
    };

    const $ = (selector) => document.querySelector(selector);

    const i18n = {
      'zh-CN': {
        title: 'Rust Proxy Manager',
        setupDesc: '此实例尚未初始化，请设置管理员账号以开始使用。',
        setupAdminUser: '管理员用户',
        setupAdminPass: '管理员密码',
        setupInitBtn: '初始化',
        loginDesc: '请输入管理员账号和密码。',
        loginBtn: '登录',
        logout: '退出',
        loading: '加载中',
        connecting: '连接中...',
        setupRequired: '需要设置',
        refreshing: '刷新中...',
        refreshed: '已刷新',
        refresh: '刷新',
        start: '启动',
        stop: '停止',
        subscriptions: '订阅',
        subUrl: 'URL',
        subName: '名称',
        subPlaceholder: 'https://example.com/sub',
        subNamePlaceholder: '可选',
        subAddBtn: '添加并同步',
        nodes: '节点',
        socksAccounts: 'Socks 账号',
        accountName: '名称',
        accountUsername: '用户名',
        accountPassword: '密码',
        accountNode: '节点',
        accountSave: '保存',
        accountCancel: '取消',
        mihomoConfig: 'Mihomo 配置',
        preview: '预览',
        noSubscriptions: '暂无订阅',
        noNodes: '暂无节点',
        noAccounts: '暂无 Socks 账号',
        statusRunning: '运行中',
        statusStopped: '已停止',
        statusConfig: '配置',
        toastInit: '初始化成功',
        toastSubAdded: '订阅已同步',
        toastSubSynced: '订阅已同步',
        toastSubDeleted: '订阅已删除',
        toastNodeDeleted: '节点已删除',
        toastAccountSaved: '账号已保存',
        toastAccountDeleted: '账号已删除',
        toastMihomoStarted: 'Mihomo 已启动',
        toastMihomoStopped: 'Mihomo 已停止',
        tableName: '名称',
        tableUrl: 'URL',
        tableLastSync: '最近同步',
        tableEnabled: '启用',
        tableType: '类型',
        tableServer: '服务器',
        tableUser: '用户',
        tableNode: '节点',
        btnSync: '同步',
        btnDelete: '删除',
        btnEdit: '编辑',
        langSwitchTo: 'EN',
      },
      en: {
        title: 'Rust Proxy Manager',
        setupDesc: 'This instance has not been initialized. Set an admin account to begin.',
        setupAdminUser: 'Admin user',
        setupAdminPass: 'Admin password',
        setupInitBtn: 'Initialize',
        loginDesc: 'Enter the administrator username and password.',
        loginBtn: 'Sign in',
        logout: 'Sign out',
        loading: 'Loading',
        connecting: 'Connecting...',
        setupRequired: 'Setup required',
        refreshing: 'Refreshing...',
        refreshed: 'Refreshed',
        refresh: 'Refresh',
        start: 'Start',
        stop: 'Stop',
        subscriptions: 'Subscriptions',
        subUrl: 'URL',
        subName: 'Name',
        subPlaceholder: 'https://example.com/sub',
        subNamePlaceholder: 'optional',
        subAddBtn: 'Add & Sync',
        nodes: 'Nodes',
        socksAccounts: 'Socks Accounts',
        accountName: 'Name',
        accountUsername: 'Username',
        accountPassword: 'Password',
        accountNode: 'Node',
        accountSave: 'Save',
        accountCancel: 'Cancel',
        mihomoConfig: 'Mihomo Config',
        preview: 'Preview',
        noSubscriptions: 'No subscriptions',
        noNodes: 'No nodes',
        noAccounts: 'No Socks accounts',
        statusRunning: 'running',
        statusStopped: 'stopped',
        statusConfig: 'Config',
        toastInit: 'Initialized',
        toastSubAdded: 'Subscription synced',
        toastSubSynced: 'Subscription synced',
        toastSubDeleted: 'Subscription deleted',
        toastNodeDeleted: 'Node deleted',
        toastAccountSaved: 'Account saved',
        toastAccountDeleted: 'Account deleted',
        toastMihomoStarted: 'Mihomo started',
        toastMihomoStopped: 'Mihomo stopped',
        tableName: 'Name',
        tableUrl: 'URL',
        tableLastSync: 'Last sync',
        tableEnabled: 'Enabled',
        tableType: 'Type',
        tableServer: 'Server',
        tableUser: 'User',
        tableNode: 'Node',
        btnSync: 'Sync',
        btnDelete: 'Delete',
        btnEdit: 'Edit',
        langSwitchTo: '中',
      },
    };

    function _(key) {
      return i18n[state.lang][key] || key;
    }

    function setLanguage(lang) {
      state.lang = lang;
      document.documentElement.lang = lang;

      // Setup view
      $('#setup-title').textContent = _('title');
      $('#setup-desc').textContent = _('setupDesc');
      const setupUserLabel = $('#setup-admin-user-label');
      if (setupUserLabel) setupUserLabel.childNodes[0].textContent = _('setupAdminUser');
      const setupPassLabel = $('#setup-admin-pass-label');
      if (setupPassLabel) setupPassLabel.childNodes[0].textContent = _('setupAdminPass');
      $('#setup-init-btn').textContent = _('setupInitBtn');
      $('#setup-lang-btn').textContent = _('langSwitchTo');

      // Login view
      $('#login-title').textContent = _('title');
      $('#login-desc').textContent = _('loginDesc');
      $('#login-admin-user-label').childNodes[0].textContent = _('setupAdminUser');
      $('#login-admin-pass-label').childNodes[0].textContent = _('setupAdminPass');
      $('#login-btn').textContent = _('loginBtn');
      $('#login-lang-btn').textContent = _('langSwitchTo');

      // App header
      $('#app-lang-btn').textContent = _('langSwitchTo');
      $('#logout-btn').textContent = _('logout');

      // Status line: if still a loading placeholder, translate it
      const statusLine = $('#status-line');
      if (statusLine.textContent === '加载中' || statusLine.textContent === 'Loading') {
        statusLine.textContent = _('loading');
      }

      // Buttons
      $('#refresh-btn').textContent = _('refresh');
      $('#start-btn').textContent = _('start');
      $('#stop-btn').textContent = _('stop');

      // Section headings
      const bands = document.querySelectorAll('.band');
      if (bands[0]) bands[0].querySelector('.section-head h2').textContent = _('subscriptions');
      if (bands[1]) bands[1].querySelector('.section-head h2').textContent = _('nodes');
      if (bands[2]) bands[2].querySelector('.section-head h2').textContent = _('socksAccounts');
      if (bands[3]) bands[3].querySelector('.section-head h2').textContent = _('mihomoConfig');

      // Subscription form text
      const subUrlLabel = $('#sub-url-label');
      if (subUrlLabel) subUrlLabel.childNodes[0].textContent = _('subUrl');
      const subNameLabel = $('#sub-name-label');
      if (subNameLabel) subNameLabel.childNodes[0].textContent = _('subName');
      const subUrlInput = $('#sub-url-input');
      if (subUrlInput) subUrlInput.placeholder = _('subPlaceholder');
      const subNameInput = $('#sub-name-input');
      if (subNameInput) subNameInput.placeholder = _('subNamePlaceholder');
      $('#sub-add-btn').textContent = _('subAddBtn');

      // Account form text
      const accNameLabel = $('#acc-name-label');
      if (accNameLabel) accNameLabel.childNodes[0].textContent = _('accountName');
      const accUsernameLabel = $('#acc-username-label');
      if (accUsernameLabel) accUsernameLabel.childNodes[0].textContent = _('accountUsername');
      const accPasswordLabel = $('#acc-password-label');
      if (accPasswordLabel) accPasswordLabel.childNodes[0].textContent = _('accountPassword');
      const accNodeLabel = $('#acc-node-label');
      if (accNodeLabel) accNodeLabel.childNodes[0].textContent = _('accountNode');
      $('#acc-save-btn').textContent = _('accountSave');
      $('#account-cancel').textContent = _('accountCancel');

      // Config section
      $('#preview-btn').textContent = _('preview');

      // Re-render dynamic content
      if (state.initialized) {
        renderSubscriptions();
        renderNodes();
        renderAccounts();
      }
    }

    function toggleLang() {
      const newLang = state.lang === 'zh-CN' ? 'en' : 'zh-CN';
      setLanguage(newLang);
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          'content-type': 'application/json',
          ...(options.headers || {}),
        },
      });
      const text = await response.text();
      const data = text ? JSON.parse(text) : null;
      if (!response.ok) {
        if (response.status === 401 && path !== '/api/auth/login') {
          state.authenticated = false;
          showLoginView();
        }
        throw new Error(data?.error || response.statusText);
      }
      return data;
    }

    function toast(message) {
      const el = $('#toast');
      el.textContent = message;
      el.classList.remove('hidden');
      el.classList.remove('waiting');
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.classList.add('hidden'), 2600);
    }

    function toastWaiting(message) {
      const el = $('#toast');
      el.textContent = message;
      el.classList.remove('hidden');
      el.classList.add('waiting');
      clearTimeout(toast.timer);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function nodeLabel(node) {
      return `${node.name} (${node.node_type}${node.server ? ` ${node.server}:${node.port}` : ''})`;
    }

    function showSetupView() {
      $('#setup-view').classList.remove('hidden');
      $('#login-view').classList.add('hidden');
      $('#app-view').classList.add('hidden');
    }

    function showLoginView() {
      $('#setup-view').classList.add('hidden');
      $('#login-view').classList.remove('hidden');
      $('#app-view').classList.add('hidden');
    }

    function showAppView() {
      $('#setup-view').classList.add('hidden');
      $('#login-view').classList.add('hidden');
      $('#app-view').classList.remove('hidden');
    }

    /* Loading state helpers */
    function setLoading(el, loading) {
      if (!el || el.dataset.loading === String(loading)) return;
      el.dataset.loading = String(loading);
      if (loading) {
        el.dataset.origText = el.innerHTML;
        el.disabled = true;
        el.innerHTML = '<span class="spinner"></span>' + el.dataset.origText;
      } else {
        el.innerHTML = el.dataset.origText || el.innerHTML;
        el.disabled = false;
      }
    }

    function setFormLoading(form, loading) {
      if (!form) return;
      form.querySelectorAll('button[type="submit"]').forEach(btn => setLoading(btn, loading));
    }

    function setAppLoading(loading) {
      $('#loading-overlay').classList.toggle('hidden', !loading);
    }

    function showSkeleton(containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;
      container.innerHTML = '<div class="table-skeleton"><div class="table-skeleton-line"></div><div class="table-skeleton-line"></div><div class="table-skeleton-line"></div></div>';
    }

    async function checkInit() {
      setAppLoading(true);
      toastWaiting(_('connecting'));
      try {
        const status = await api('/api/status');
        state.initialized = status.initialized;
        state.authenticated = status.authenticated;
        state.mihomo = status.mihomo;
        state.socks_port = status.socks_port;
        setLanguage(state.lang);
        if (!state.initialized) {
          toast(_('setupRequired'));
          showSetupView();
          return;
        }
        if (!state.authenticated) {
          showLoginView();
          return;
        }
        await loadAppData();
      } finally {
        setAppLoading(false);
      }
    }

    async function loadAppData() {
      showSkeleton('subscriptions');
      showSkeleton('nodes');
      showSkeleton('accounts');
      const [subscriptions, nodesData, accounts] = await Promise.all([
        api('/api/subscriptions'),
        api('/api/nodes'),
        api('/api/socks-accounts'),
      ]);
      state.subscriptions = subscriptions;
      state.nodes = nodesData.nodes || [];
      state.accounts = accounts;
      showAppView();
      render();
    }

    async function refreshAll() {
      setAppLoading(true);
      toastWaiting(_('refreshing'));
      try {
        const status = await api('/api/status');
        state.initialized = status.initialized;
        state.authenticated = status.authenticated;
        state.mihomo = status.mihomo;
        state.socks_port = status.socks_port;
        setLanguage(state.lang);
        if (!state.initialized) {
          state.subscriptions = [];
          state.nodes = [];
          state.accounts = [];
          showSetupView();
          toast(_('setupRequired'));
          return;
        }
        if (!state.authenticated) {
          showLoginView();
          return;
        }
        await loadAppData();
        toast(_('refreshed'));
      } finally {
        setAppLoading(false);
      }
    }

    function render() {
      const running = state.mihomo?.running;
      $('#status-line').textContent = `Mihomo: ${running ? _('statusRunning') : _('statusStopped')} | ${_('statusConfig')}: ${state.mihomo?.config_path || '-'}`;
      $('#socks-line').textContent = `SOCKS5 Port: ${state.socks_port || '-'}`;
      $('#subscription-count').textContent = state.subscriptions.length;
      $('#node-count').textContent = state.nodes.length;
      $('#account-count').textContent = state.accounts.length;
      renderSubscriptions();
      renderNodes();
      renderNodeOptions();
      renderAccounts();
    }

    function renderSubscriptions() {
      if (!state.subscriptions.length) {
        $('#subscriptions').innerHTML = `<p class="empty">${_('noSubscriptions')}</p>`;
        return;
      }
      $('#subscriptions').innerHTML = `
        <table>
          <thead><tr><th>${_('tableName')}</th><th>${_('tableUrl')}</th><th>${_('tableLastSync')}</th><th></th></tr></thead>
          <tbody>${
            state.subscriptions.map(sub => `
              <tr>
                <td>${escapeHtml(sub.name)}</td>
                <td class="mono truncate">${escapeHtml(sub.url)}</td>
                <td>${sub.last_synced_at ? new Date(sub.last_synced_at * 1000).toLocaleString() : '-'}</td>
                <td class="row-actions">
                  <button type="button" data-sync-sub="${sub.id}" class="secondary">${_('btnSync')}</button>
                  <button type="button" data-delete-sub="${sub.id}" class="danger">${_('btnDelete')}</button>
                </td>
              </tr>`).join('')
          }</tbody>
        </table>`;
    }

    function renderNodes() {
      if (!state.nodes.length) {
        $('#nodes').innerHTML = `<p class="empty">${_('noNodes')}</p>`;
        return;
      }
      $('#nodes').innerHTML = `
        <table>
          <thead><tr><th>${_('tableEnabled')}</th><th>${_('tableName')}</th><th>${_('tableType')}</th><th>${_('tableServer')}</th><th></th></tr></thead>
          <tbody>${
            state.nodes.map(node => `
              <tr>
                <td><input type="checkbox" data-node-enabled="${node.id}" ${node.enabled ? 'checked' : ''}></td>
                <td>${escapeHtml(node.name)}</td>
                <td>${escapeHtml(node.node_type)}</td>
                <td class="mono">${escapeHtml(node.server)}:${escapeHtml(node.port)}</td>
                <td class="row-actions"><button type="button" data-delete-node="${node.id}" class="danger">${_('btnDelete')}</button></td>
              </tr>`).join('')
          }</tbody>
        </table>`;
    }

    function renderNodeOptions() {
      const select = $('#account-form select[name="node_id"]');
      select.innerHTML = state.nodes
        .filter(node => node.enabled)
        .map(node => `<option value="${node.id}">${escapeHtml(nodeLabel(node))}</option>`)
        .join('');
    }

    function renderAccounts() {
      if (!state.accounts.length) {
        $('#accounts').innerHTML = `<p class="empty">${_('noAccounts')}</p>`;
        return;
      }
      const nodeById = new Map(state.nodes.map(node => [node.id, node]));
      $('#accounts').innerHTML = `
        <table>
          <thead><tr><th>${_('tableEnabled')}</th><th>${_('tableName')}</th><th>${_('tableUser')}</th><th>${_('tableNode')}</th><th></th></tr></thead>
          <tbody>${
            state.accounts.map(account => `
              <tr>
                <td><input type="checkbox" data-account-enabled="${account.id}" ${account.enabled ? 'checked' : ''}></td>
                <td>${escapeHtml(account.name)}</td>
                <td class="mono">${escapeHtml(account.username)}</td>
                <td>${escapeHtml(nodeById.get(account.node_id)?.name || account.node_id)}</td>
                <td class="row-actions">
                  <button type="button" data-edit-account="${account.id}" class="secondary">${_('btnEdit')}</button>
                  <button type="button" data-delete-account="${account.id}" class="danger">${_('btnDelete')}</button>
                </td>
              </tr>`).join('')
          }</tbody>
        </table>`;
    }

    $('#init-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const btn = event.currentTarget.querySelector('button[type="submit"]');
      setLoading(btn, true);
      try {
        const form = new FormData(event.currentTarget);
        await api('/api/init', {
          method: 'POST',
          body: JSON.stringify(Object.fromEntries(form)),
        });
        state.initialized = true;
        state.authenticated = true;
        toast(_('toastInit'));
        await loadAppData();
      } catch (error) {
        toast(error.message);
      } finally {
        setLoading(btn, false);
      }
    });

    $('#login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.currentTarget;
      const button = form.querySelector('button[type="submit"]');
      setLoading(button, true);
      try {
        await api('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify(Object.fromEntries(new FormData(form))),
        });
        state.authenticated = true;
        form.reset();
        await loadAppData();
      } catch (error) {
        toast(error.message);
      } finally {
        setLoading(button, false);
      }
    });

    $('#subscription-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      setFormLoading(event.currentTarget, true);
      try {
        await api('/api/subscriptions', {
          method: 'POST',
          body: JSON.stringify(Object.fromEntries(form)),
        });
        toast(_('toastSubAdded'));
        const [subscriptions, nodesData] = await Promise.all([
          api('/api/subscriptions'),
          api('/api/nodes'),
        ]);
        state.subscriptions = subscriptions;
        state.nodes = nodesData.nodes || [];
        renderSubscriptions();
        renderNodes();
        renderNodeOptions();
        renderAccounts();
        $('#subscription-count').textContent = state.subscriptions.length;
        $('#node-count').textContent = state.nodes.length;
        event.currentTarget.reset();
      } catch (error) {
        toast(error.message);
      } finally {
        setFormLoading(event.currentTarget, false);
      }
    });

    $('#account-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = new FormData(event.currentTarget);
      const id = form.get('id');
      const payload = Object.fromEntries(form);
      delete payload.id;
      payload.node_id = Number(payload.node_id);
      setFormLoading(event.currentTarget, true);
      try {
        await api(id ? `/api/socks-accounts/${id}` : '/api/socks-accounts', {
          method: id ? 'PUT' : 'POST',
          body: JSON.stringify(payload),
        });
        toast(_('toastAccountSaved'));
        state.accounts = await api('/api/socks-accounts');
        renderAccounts();
        $('#account-count').textContent = state.accounts.length;
        event.currentTarget.reset();
        event.currentTarget.elements.id.value = '';
        $('#account-cancel').classList.add('hidden');
      } catch (error) {
        toast(error.message);
      } finally {
        setFormLoading(event.currentTarget, false);
      }
    });

    $('#account-cancel').addEventListener('click', () => {
      const form = $('#account-form');
      form.reset();
      form.elements.id.value = '';
      $('#account-cancel').classList.add('hidden');
    });

    $('#setup-lang-btn').addEventListener('click', toggleLang);
    $('#login-lang-btn').addEventListener('click', toggleLang);
    $('#app-lang-btn').addEventListener('click', toggleLang);

    document.body.addEventListener('click', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;

      const syncSub = target.dataset.syncSub;
      const deleteSub = target.dataset.deleteSub;
      const deleteNode = target.dataset.deleteNode;
      const editAccount = target.dataset.editAccount;
      const deleteAccount = target.dataset.deleteAccount;

      try {
        if (syncSub) {
          setLoading(target, true);
          try {
            await api(`/api/subscriptions/${syncSub}/sync`, { method: 'POST', body: '{}' });
            const [subscriptions, nodesData, accounts] = await Promise.all([
              api('/api/subscriptions'),
              api('/api/nodes'),
              api('/api/socks-accounts'),
            ]);
            state.subscriptions = subscriptions;
            state.nodes = nodesData.nodes || [];
            state.accounts = accounts;
            render();
            toast(_('toastSubSynced'));
          } finally {
            setLoading(target, false);
          }
        } else if (deleteSub) {
          setLoading(target, true);
          await api(`/api/subscriptions/${deleteSub}`, { method: 'DELETE' });
          state.subscriptions = state.subscriptions.filter(item => item.id !== Number(deleteSub));
          const deletedNodeIds = new Set(state.nodes.filter(node => node.subscription_id === Number(deleteSub)).map(node => node.id));
          state.nodes = state.nodes.filter(node => node.subscription_id !== Number(deleteSub));
          state.accounts = state.accounts.filter(account => !deletedNodeIds.has(account.node_id));
          render();
          toast(_('toastSubDeleted'));
        } else if (deleteNode) {
          setLoading(target, true);
          await api(`/api/nodes/${deleteNode}`, { method: 'DELETE' });
          state.nodes = state.nodes.filter(node => node.id !== Number(deleteNode));
          state.accounts = state.accounts.filter(account => account.node_id !== Number(deleteNode));
          render();
          toast(_('toastNodeDeleted'));
        } else if (editAccount) {
          const account = state.accounts.find(item => item.id === Number(editAccount));
          if (!account) return;
          const form = $('#account-form');
          const fields = form.elements;
          fields.id.value = account.id;
          fields.name.value = account.name;
          fields.username.value = account.username;
          fields.password.value = account.password;
          fields.node_id.value = account.node_id;
          $('#account-cancel').classList.remove('hidden');
        } else if (deleteAccount) {
          setLoading(target, true);
          await api(`/api/socks-accounts/${deleteAccount}`, { method: 'DELETE' });
          state.accounts = state.accounts.filter(account => account.id !== Number(deleteAccount));
          renderAccounts();
          $('#account-count').textContent = state.accounts.length;
          toast(_('toastAccountDeleted'));
        }
      } catch (error) {
        toast(error.message);
      }
    });

    document.body.addEventListener('change', async (event) => {
      const target = event.target;
      if (!(target instanceof HTMLInputElement)) return;
      const enabled = target.checked;
      target.disabled = true;
      try {
        if (target.dataset.nodeEnabled) {
          await api(`/api/nodes/${target.dataset.nodeEnabled}/enabled`, {
            method: 'PUT',
            body: JSON.stringify({ enabled }),
          });
          const node = state.nodes.find(item => item.id === Number(target.dataset.nodeEnabled));
          if (node) node.enabled = enabled;
          renderNodeOptions();
        } else if (target.dataset.accountEnabled) {
          await api(`/api/socks-accounts/${target.dataset.accountEnabled}/enabled`, {
            method: 'PUT',
            body: JSON.stringify({ enabled }),
          });
          const account = state.accounts.find(item => item.id === Number(target.dataset.accountEnabled));
          if (account) account.enabled = enabled;
        }
      } catch (error) {
        target.checked = !enabled;
        toast(error.message);
      } finally {
        target.disabled = false;
      }
    });

    $('#refresh-btn').addEventListener('click', () => refreshAll().catch(error => toast(error.message)));
    $('#logout-btn').addEventListener('click', async () => {
      try {
        await api('/api/auth/logout', { method: 'POST', body: '{}' });
      } catch (_) {
        // The local session is considered closed even if the request races with expiry.
      }
      state.authenticated = false;
      state.subscriptions = [];
      state.nodes = [];
      state.accounts = [];
      showLoginView();
    });
    $('#start-btn').addEventListener('click', async (event) => {
      setLoading(event.currentTarget, true);
      try {
        await api('/api/mihomo/start', { method: 'POST', body: '{}' });
        state.mihomo = await api('/api/mihomo/status');
        render();
        toast(_('toastMihomoStarted'));
      } catch (error) {
        toast(error.message);
      } finally {
        setLoading(event.currentTarget, false);
      }
    });
    $('#stop-btn').addEventListener('click', async (event) => {
      setLoading(event.currentTarget, true);
      try {
        await api('/api/mihomo/stop', { method: 'POST', body: '{}' });
        state.mihomo = await api('/api/mihomo/status');
        render();
        toast(_('toastMihomoStopped'));
      } catch (error) {
        toast(error.message);
      } finally {
        setLoading(event.currentTarget, false);
      }
    });
    $('#preview-btn').addEventListener('click', async () => {
      try {
        const data = await api('/api/config/preview');
        $('#config-output').textContent = data.yaml;
      } catch (error) {
        toast(error.message);
      }
    });

    checkInit().catch(error => toast(error.message));
  </script>
</body>
</html>
